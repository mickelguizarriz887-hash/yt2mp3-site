<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT2MP3</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Inter, sans-serif;
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* PARTICLES */
canvas {
  position:fixed;
  inset:0;
  z-index:-3;
}

/* GLOW */
.bg {
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,0,0.18), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,0,0,0.10), transparent 35%);
}

/* NAV */
.nav {
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:14px 30px;
  background:rgba(10,10,10,0.6);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,0,0,0.2);
}

.logo { font-weight:800; color:red; }

.nav a {
  margin-left:10px;
  padding:8px 14px;
  border:1px solid rgba(255,0,0,0.3);
  border-radius:10px;
  text-decoration:none;
  color:white;
  transition:.25s;
}

.nav a:hover {
  background:red;
  box-shadow:0 0 15px red;
}

/* STATUS */
.status {
  text-align:center;
  font-size:13px;
  color:#aaa;
  padding:10px;
}

.dot {
  width:8px;height:8px;
  background:lime;
  display:inline-block;
  border-radius:50%;
  margin-right:5px;
  box-shadow:0 0 10px lime;
}

/* HERO */
.hero {
  text-align:center;
  padding:90px 20px 30px;
}

.hero h1 {
  font-size:64px;
  color:red;
  text-shadow:0 0 25px red;
}

.hero p { color:#aaa; margin-top:10px; }

.btn {
  display:inline-block;
  margin-top:25px;
  padding:14px 26px;
  border-radius:12px;
  background:linear-gradient(135deg, red, #7a0000);
  box-shadow:0 0 25px rgba(255,0,0,0.4);
  cursor:pointer;
}

/* STATS */
.stats {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  max-width:900px;
  margin:50px auto;
  padding:0 20px;
}

.stat {
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,0,0,0.15);
  padding:20px;
  border-radius:14px;
  text-align:center;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.8);
}

.box {
  background:#111;
  padding:25px;
  border-radius:12px;
  width:300px;
  text-align:center;
  border:1px solid red;
}

.bar {
  height:10px;
  background:#222;
  border-radius:10px;
  margin-top:15px;
  overflow:hidden;
}

.fill {
  height:100%;
  width:0%;
  background:red;
}

/* LINKS */
.links {
  display:flex;
  justify-content:center;
  gap:15px;
  margin:30px 0;
  flex-wrap:wrap;
}

.links a {
  padding:10px 16px;
  border-radius:10px;
  border:1px solid rgba(255,0,0,0.3);
  text-decoration:none;
  color:white;
  transition:.25s;
}

.links a:hover {
  background:red;
  box-shadow:0 0 15px red;
}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  color:#666;
  border-top:1px solid rgba(255,0,0,0.1);
}
</style>
</head>

<body>

<canvas id="p"></canvas>
<div class="bg"></div>

<div class="nav">
  <div class="logo">🎧 YT2MP3</div>
  <div>
    <a href="https://drive.google.com/file/d/1RZRW2mhOkWmaW1-19hhlKp3n7N6-Eued/view?usp=sharing">Download</a>
    <a href="https://discord.gg/w8tzJUYp">Discord</a>
    <a href="https://github.com/mickelguizarriz887-hash/yt2mp3-site">GitHub</a>
  </div>
</div>

<div class="status">
  <span><span class="dot"></span>Servers Online</span>
  <span style="margin-left:15px;">Live downloads: <b id="count">15234</b></span>
</div>

<div class="hero">
  <h1>YT2MP3</h1>
  <p>Convert YouTube videos into MP3 instantly</p>
  <div class="btn" onclick="openDownload()">Download Now</div>
</div>

<div class="stats">
  <div class="stat">Version <h2>v1.0.0</h2></div>
  <div class="stat">Downloads <h2 id="count2">15,234+</h2></div>
  <div class="stat">Security <h2>100% Safe</h2></div>
</div>

<div class="links">
  <a href="https://drive.google.com/file/d/1RZRW2mhOkWmaW1-19hhlKp3n7N6-Eued/view?usp=sharing">⬇ Download</a>
  <a href="https://discord.gg/w8tzJUYp">💬 Discord</a>
  <a href="https://github.com/mickelguizarriz887-hash/yt2mp3-site">💻 GitHub</a>
</div>

<footer>© 2026 YT2MP3</footer>

<!-- DOWNLOAD MODAL -->
<div class="modal" id="m">
  <div class="box">
    <h3>Preparing Download</h3>
    <p id="t">Starting...</p>
    <div class="bar"><div class="fill" id="f"></div></div>
  </div>
</div>

<script>
/* LIVE COUNTER */
let c = 15234;
setInterval(() => {
  c += Math.floor(Math.random()*4);
  document.getElementById("count").innerText = c;
  document.getElementById("count2").innerText = c.toLocaleString() + "+";
}, 2500);

/* DOWNLOAD MODAL */
function openDownload(){
  document.getElementById("m").style.display="flex";

  let p=0;
  let f=document.getElementById("f");
  let t=document.getElementById("t");

  let steps=["Connecting","Loading file","Verifying","Finalizing","Ready"];

  let i=0;
  let int=setInterval(()=>{
    p+=20;
    f.style.width=p+"%";
    t.innerText=steps[i++];

    if(p>=100){
      clearInterval(int);
      setTimeout(()=>t.innerText="Download started ✔",500);
      window.location.href="https://drive.google.com/file/d/1RZRW2mhOkWmaW1-19hhlKp3n7N6-Eued/view?usp=sharing";
    }
  },600);
}

/* PARTICLES */
const canvas=document.getElementById("p");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let parts=[];
for(let i=0;i<70;i++){
  parts.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function anim(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  parts.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;

    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(anim);
}
anim();
</script>

</body>
</html>
